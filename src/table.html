<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forecast Orders</title>
  </head>
  <body class="min-vh-100 d-flex flex-column">
    <div
      id="pageLoader"
      class="page-loader d-none"
      role="status"
      aria-live="polite"
      aria-hidden="true"
    >
      <div class="page-loader__content text-center">
        <div class="spinner-border text-dark" aria-hidden="true"></div>
        <div class="mt-2 small text-body-secondary">Loading table data...</div>
      </div>
    </div>

    <!-- Table Title and Refresh -->

    <div class="d-flex justify-content-between align-items-center my-2 mx-1">
      <h5 class="mb-0" id="tableDisplayName">ForecastOrders</h5>
      <button
        class="btn btn-sm btn-outline-dark rounded-2"
        type="button"
        id="refreshDataBtn"
        aria-label="Refresh Data"
      >
        <i class="fa-solid fa-sync-alt"></i>
      </button>
    </div>

    <!-- <div class="flex-fill d-flex">

        </div> -->
    <!-- Table -->
    <div id="sclTableDiv" class="flex-fill d-flex align-items-start mx-1" style="overflow-y: auto">
      <table class="table table-hover table-sm table-bordered mb-0 scl-table">
        <thead class="scl-thead">
          <tr id="sclTableHead1" class="head1"></tr>
          <!-- Filter Row -->
          <tr id="sclTableHead2" class="head2"></tr>
        </thead>
        <tbody class="scl-tbody" id="sclTableBody"></tbody>
      </table>
    </div>

    <!-- Toolbar and Pagination -->
    <div class="d-flex justify-content-between align-items-center my-2 mx-1">
      <!-- Action Buttons -->
      <div class="btn-group">
        <button class="btn btn-sm btn-outline-dark" title="Delete">
          <i class="fa-solid fa-trash-alt"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Download">
          <i class="fa-solid fa-download"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Upload">
          <i class="fa-solid fa-upload"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Export">
          <i class="fa-solid fa-file-export"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" id="addColumnBtn" title="Add New Column">
          <i class="fa-solid fa-plus-circle"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" id="removeColumnBtn" title="Remove Column">
          <i class="fa-solid fa-minus-circle"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Grid View">
          <i class="fa-solid fa-th"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Previous">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Next">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Edit">
          <i class="fa-solid fa-pencil-alt"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Undo">
          <i class="fa-solid fa-undo"></i>
        </button>
        <button
          class="btn btn-sm btn-outline-dark"
          title="Columns"
          id="selectTableColumns"
          data-bs-toggle="modal"
          data-bs-target="#selectColumnsModal"
        >
          <i class="fa-solid fa-columns"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Filter">
          <i class="fa-solid fa-filter"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Copy">
          <i class="fa-solid fa-copy"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Save">
          <i class="fa-solid fa-save"></i>
        </button>
        <button class="btn btn-sm btn-outline-dark" title="Table View">
          <i class="fa-solid fa-table"></i>
        </button>
      </div>

      <!-- Select Columns Modal -->
      <div
        class="modal fade"
        id="selectColumnsModal"
        tabindex="-1"
        aria-labelledby="selectColumnsLabel"
        aria-hidden="true"
        data-bs-backdrop="static"
        data-bs-keyboard="false"
      >
        <div class="modal-dialog modal-md modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="selectColumnsLabel">Select Columns</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body p-2">
              <div class="row flex-fill">
                <!-- Available Columns -->
                <div class="col-5 flex-fill d-flex flex-column" style="min-width: 0">
                  <label class="form-label fw-semibold small mb-1 text-center">
                    Available Columns
                  </label>
                  <div class="border rounded col-select-list" id="availableColumnsList"></div>
                </div>
                <!-- Transfer Buttons -->
                <div class="col-2 d-flex flex-column justify-content-center gap-1">
                  <button
                    class="btn btn-sm btn-outline-dark"
                    id="moveToSelectedBtn"
                    title="Move to selected"
                  >
                    <i class="fa-solid fa-chevron-right"></i>
                  </button>
                  <button
                    class="btn btn-sm btn-outline-dark"
                    id="moveAllToSelectedBtn"
                    title="Move all to selected"
                  >
                    <i class="fa-solid fa-angle-double-right"></i>
                  </button>
                  <button
                    class="btn btn-sm btn-outline-dark"
                    id="moveToAvailableBtn"
                    title="Move to available"
                  >
                    <i class="fa-solid fa-chevron-left"></i>
                  </button>
                  <button
                    class="btn btn-sm btn-outline-dark"
                    id="moveAllToAvailableBtn"
                    title="Move all to available"
                  >
                    <i class="fa-solid fa-angle-double-left"></i>
                  </button>
                </div>
                <!-- Selected Columns -->
                <div class="col-5 flex-fill d-flex flex-column" style="min-width: 0">
                  <label class="form-label fw-semibold small mb-1 text-center">
                    Selected Columns
                  </label>
                  <div class="border rounded col-select-list" id="selectedColumnsList"></div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
                id="CancelSelectColumnsBtn"
              >
                Cancel
              </button>
              <button type="button" class="btn btn-dark ms-auto" id="submitSelectColumnsBtn">
                OK
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Column Modal -->
      <div
        class="modal fade"
        id="addColumnModal"
        tabindex="-1"
        aria-labelledby="addColumnLabel"
        aria-hidden="true"
        data-bs-backdrop="static"
        data-bs-keyboard="false"
      >
        <div class="modal-dialog modal-md modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="addColumnLabel">Add Column</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="addColumnName" class="form-label">Column Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="addColumnName"
                  placeholder="Enter column name"
                />
              </div>
              <div class="mb-0">
                <label for="addColumnDataType" class="form-label">Data Type</label>
                <select class="form-select" id="addColumnDataType">
                  <option value="TEXT">TEXT</option>
                  <option value="NUMERIC">NUMERIC</option>
                  <option value="INTEGER">INTEGER</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                Cancel
              </button>
              <button type="button" class="btn btn-dark ms-auto" id="submitAddColumnBtn">OK</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div class="d-flex align-items-center gap-2">
        <div class="d-flex align-items-center gap-2" id="paginationControls">
          <button id="paginationFirstBtn" class="btn btn-sm btn-outline-dark">
            <i class="fas fa-chevron-left"></i>
            <i class="fas fa-chevron-left"></i>
          </button>
          <button id="paginationPrevBtn" class="btn btn-sm btn-outline-dark">
            <i class="fas fa-chevron-left"></i>
          </button>
          <span class="text-muted">Page</span>
          <input
            id="paginationPageInput"
            type="text"
            class="form-control form-control-sm"
            value="1"
            style="width: 50px"
          />
          <span class="text-muted" id="paginationTotalPages">of 1</span>
          <button id="paginationNextBtn" class="btn btn-sm btn-outline-dark">
            <i class="fas fa-chevron-right"></i>
          </button>
          <button id="paginationLastBtn" class="btn btn-sm btn-outline-dark">
            <i class="fas fa-chevron-right"></i>
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
        <span class="text-muted mx-2" id="paginationInfo"></span>
      </div>
    </div>

    <script type="module" src="page_assets/table/js/main.js"></script>
  </body>
</html>
